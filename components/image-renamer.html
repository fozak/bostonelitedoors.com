<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Renamer — Boston Door Company</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8b84b;
    --text: #e8e8e8;
    --muted: #666;
    --green: #4caf7d;
    --red: #e05a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-size: 12px;
    color: var(--muted);
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 24px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232, 184, 75, 0.04);
  }

  .drop-zone input { display: none; }

  .drop-zone .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .drop-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-zone strong {
    color: var(--accent);
    cursor: pointer;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  select, button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 3px;
    cursor: pointer;
  }

  select:focus, button:focus { outline: 1px solid var(--accent); }

  button.primary {
    background: var(--accent);
    color: #0f0f0f;
    font-weight: 700;
    border-color: var(--accent);
    letter-spacing: 0.05em;
  }

  button.primary:hover { opacity: 0.85; }
  button:not(.primary):hover { border-color: var(--accent); }

  .counter {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #444; }
  .card.renamed { border-color: var(--green); }
  .card.analyzing { border-color: var(--accent); }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: #111;
  }

  .card-body {
    padding: 12px;
  }

  .original-name {
    font-size: 10px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .original-name span {
    color: #444;
    margin-right: 4px;
  }

  .name-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }

  .name-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 2px;
    min-width: 0;
  }

  .name-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .name-input.ai-filled {
    border-color: var(--green);
    color: var(--green);
  }

  .btn-ai {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 6px 8px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-ai:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ai.loading { color: var(--accent); border-color: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .category-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .cat-select {
    flex: 1;
    font-size: 11px;
    padding: 5px 8px;
  }

  .copy-btn {
    font-size: 10px;
    padding: 5px 8px;
    color: var(--muted);
    border-color: var(--border);
  }

  .copy-btn:hover { color: var(--accent); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }

  .status-bar {
    font-size: 10px;
    margin-top: 6px;
    color: var(--muted);
    min-height: 14px;
  }

  .status-bar.ok { color: var(--green); }
  .status-bar.err { color: var(--red); }

  .export-section {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .export-section h2 {
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  #export-output {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 16px;
    font-size: 11px;
    line-height: 1.8;
    white-space: pre;
    overflow-x: auto;
    color: var(--text);
    min-height: 80px;
  }

  .export-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <h1>Image Renamer</h1>
  <span>Boston Door Company — SEO-ready filenames</span>
</header>

<div class="drop-zone" id="dropZone">
  <input type="file" id="fileInput" accept="image/*" multiple>
  <div class="icon">📂</div>
  <p>Drop images here or <strong onclick="document.getElementById('fileInput').click()">browse files</strong><br>
  Supports JPG, PNG, WebP — select your entire /images folder</p>
</div>

<div class="controls" id="controls" style="display:none">
  <button class="primary" onclick="analyzeAll()">⚡ AI Name All</button>
  <select id="globalCategory">
    <option value="">— assign category to all —</option>
    <option value="home-remodeling">home-remodeling</option>
    <option value="roofing-siding">roofing-siding</option>
    <option value="interior-repairs">interior-repairs</option>
    <option value="landscaping-tree-services">landscaping-tree-services</option>
    <option value="solar-energy">solar-energy</option>
    <option value="pest-control">pest-control</option>
    <option value="consulting-project-management">consulting-project-management</option>
  </select>
  <button onclick="applyGlobalCategory()">Apply to All</button>
  <button onclick="generateExport()">Generate Rename Script</button>
  <span class="counter" id="counter"></span>
</div>

<div class="grid" id="grid">
  <div class="empty" id="emptyState">No images loaded yet.</div>
</div>

<div class="export-section" id="exportSection" style="display:none">
  <h2>Rename Script (bash)</h2>
  <div id="export-output"></div>
  <div class="export-actions">
    <button onclick="copyScript()">Copy Script</button>
    <button onclick="downloadScript()">Download .sh</button>
  </div>
</div>

<script>
const CATEGORIES = [
  'home-remodeling',
  'roofing-siding',
  'interior-repairs',
  'landscaping-tree-services',
  'solar-energy',
  'pest-control',
  'consulting-project-management'
];

const catCounters = {};
CATEGORIES.forEach(c => catCounters[c] = 0);

let images = [];

// Drag & drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});
document.getElementById('fileInput').addEventListener('change', e => {
  handleFiles([...e.target.files]);
});

function handleFiles(files) {
  if (!files.length) return;
  dropZone.style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('emptyState').style.display = 'none';

  files.forEach(file => {
    const id = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const url = URL.createObjectURL(file);
    images.push({ id, file, url, suggestedName: '', category: '', ext: file.name.split('.').pop().toLowerCase() });
    renderCard(images[images.length - 1]);
  });
  updateCounter();
}

function renderCard(img) {
  const grid = document.getElementById('grid');
  const card = document.createElement('div');
  card.className = 'card';
  card.id = img.id;
  card.innerHTML = `
    <img class="card-img" src="${img.url}" alt="">
    <div class="card-body">
      <div class="original-name"><span>original:</span>${img.file.name}</div>
      <div class="name-row">
        <input class="name-input" id="name_${img.id}" type="text" placeholder="descriptor (e.g. kitchen-before)" value="${img.suggestedName}">
        <button class="btn-ai" onclick="analyzeSingle('${img.id}')">AI ✦</button>
      </div>
      <div class="category-row">
        <select class="cat-select" id="cat_${img.id}" onchange="updateCategory('${img.id}', this.value)">
          <option value="">— category —</option>
          ${CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <button class="copy-btn" id="copy_${img.id}" onclick="copyFinalName('${img.id}')">copy</button>
      </div>
      <div class="status-bar" id="status_${img.id}"></div>
    </div>
  `;
  grid.appendChild(card);
}

function updateCategory(id, val) {
  const img = images.find(i => i.id === id);
  if (img) img.category = val;
  updateFinalName(id);
}

function updateFinalName(id) {
  const img = images.find(i => i.id === id);
  if (!img) return;
  const nameInput = document.getElementById('name_' + id);
  const cat = img.category;
  const desc = nameInput.value.trim();
  if (cat && desc) {
    const num = getNumber(cat, id);
    const final = `${cat}-${num}-${desc}.${img.ext}`;
    document.getElementById('status_' + id).textContent = `→ /images/${final}`;
    document.getElementById('status_' + id).className = 'status-bar ok';
    document.getElementById(id).classList.add('renamed');
  }
}

const assignedNumbers = {};
function getNumber(cat, id) {
  const key = cat + '_' + id;
  if (!assignedNumbers[key]) {
    catCounters[cat] = (catCounters[cat] || 0) + 1;
    assignedNumbers[key] = catCounters[cat];
  }
  return String(assignedNumbers[key]).padStart(2, '0');
}

async function analyzeSingle(id) {
  const img = images.find(i => i.id === id);
  if (!img) return;
  const btn = document.querySelector(`#${id} .btn-ai`);
  const nameInput = document.getElementById('name_' + id);
  const statusEl = document.getElementById('status_' + id);

  btn.classList.add('loading');
  btn.textContent = '…';
  statusEl.textContent = 'Analyzing image…';
  statusEl.className = 'status-bar';
  document.getElementById(id).classList.add('analyzing');

  try {
    const base64 = await toBase64(img.file);
    const mediaType = img.file.type || 'image/jpeg';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `You are an SEO expert for a contractor company. Look at this image and return ONLY a JSON object with no markdown, no backticks:
{
  "descriptor": "2-3 word kebab-case description of what is shown (e.g. kitchen-countertop, roof-shingles, bathroom-vanity)",
  "category": "one of: home-remodeling | roofing-siding | interior-repairs | landscaping-tree-services | solar-energy | pest-control | consulting-project-management",
  "reason": "one short sentence why"
}
Return ONLY the JSON, nothing else.`
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    nameInput.value = parsed.descriptor || '';
    nameInput.classList.add('ai-filled');
    img.suggestedName = parsed.descriptor || '';

    if (parsed.category) {
      img.category = parsed.category;
      const catSel = document.getElementById('cat_' + id);
      if (catSel) catSel.value = parsed.category;
    }

    statusEl.textContent = '✓ ' + (parsed.reason || 'AI analysis complete');
    statusEl.className = 'status-bar ok';
    document.getElementById(id).classList.remove('analyzing');
    updateFinalName(id);

  } catch (err) {
    statusEl.textContent = '✗ ' + (err.message || 'Analysis failed');
    statusEl.className = 'status-bar err';
    document.getElementById(id).classList.remove('analyzing');
  }

  btn.classList.remove('loading');
  btn.textContent = 'AI ✦';
}

async function analyzeAll() {
  for (const img of images) {
    await analyzeSingle(img.id);
  }
}

function applyGlobalCategory() {
  const cat = document.getElementById('globalCategory').value;
  if (!cat) return;
  images.forEach(img => {
    img.category = cat;
    const sel = document.getElementById('cat_' + img.id);
    if (sel) sel.value = cat;
    updateFinalName(img.id);
  });
}

function copyFinalName(id) {
  const img = images.find(i => i.id === id);
  if (!img) return;
  const nameInput = document.getElementById('name_' + id);
  const cat = img.category;
  const desc = nameInput.value.trim();
  if (!cat || !desc) return;
  const num = getNumber(cat, id);
  const final = `${cat}-${num}-${desc}.${img.ext}`;
  navigator.clipboard.writeText(final);
  const btn = document.getElementById('copy_' + id);
  btn.textContent = '✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
}

function generateExport() {
  const lines = ['#!/bin/bash', '# Boston Door Company — Image rename script', '# Run from your /images directory', ''];
  images.forEach(img => {
    const nameInput = document.getElementById('name_' + img.id);
    const cat = img.category;
    const desc = nameInput ? nameInput.value.trim() : '';
    if (cat && desc) {
      const num = getNumber(cat, img.id);
      const newName = `${cat}-${num}-${desc}.${img.ext}`;
      lines.push(`mv "${img.file.name}" "${newName}"`);
    } else {
      lines.push(`# SKIPPED (incomplete): ${img.file.name}`);
    }
  });
  const script = lines.join('\n');
  document.getElementById('export-output').textContent = script;
  document.getElementById('exportSection').style.display = 'block';
  document.getElementById('exportSection').scrollIntoView({ behavior: 'smooth' });
  window._exportScript = script;
}

function copyScript() {
  if (window._exportScript) {
    navigator.clipboard.writeText(window._exportScript);
  }
}

function downloadScript() {
  if (!window._exportScript) return;
  const blob = new Blob([window._exportScript], { type: 'text/x-sh' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'rename-images.sh';
  a.click();
}

function updateCounter() {
  document.getElementById('counter').textContent = `${images.length} image${images.length !== 1 ? 's' : ''} loaded`;
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}
</script>
</body>
</html>
